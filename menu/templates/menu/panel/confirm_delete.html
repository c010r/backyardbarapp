{% extends "menu/panel/base_panel.html" %}
{% block title %}Confirmar eliminación{% endblock %}
{% block page_title %}Eliminar{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;text-align:center;padding:36px;">
  <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
  <h2 style="margin-bottom:12px;">¿Eliminar "{{ object }}"?</h2>
  <p style="color:var(--muted);font-size:0.88rem;margin-bottom:24px;">
    Esta acción no se puede deshacer.
  </p>
  <form method="post" style="display:flex;gap:10px;justify-content:center;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url back_url %}" class="btn btn-outline">Cancelar</a>
  </form>
</div>
{% endblock %}
