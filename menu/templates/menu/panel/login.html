<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingresar — {{ config.bar_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1a1a2e;
      border: 1px solid rgba(245,166,35,0.2);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo h1 {
      font-size: 1.6rem;
      color: #f5a623;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .login-logo small {
      display: block;
      font-size: 0.72rem;
      color: #7a7a9a;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-top: 4px;
    }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; color: #7a7a9a; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      background: #0f0f1a; border: 1px solid rgba(245,166,35,0.2);
      border-radius: 8px; color: #e8e8f0; font-size: 0.9rem;
      transition: border-color 0.15s;
    }
    input:focus { outline: none; border-color: #f5a623; }
    .btn-submit {
      width: 100%; padding: 12px;
      background: #f5a623; color: #1a1a2e;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.88; }
    .error-msg {
      background: rgba(224,82,82,0.12);
      border: 1px solid rgba(224,82,82,0.25);
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.82rem; color: #f08080;
      margin-bottom: 16px;
    }
    .back-link {
      display: block; text-align: center;
      margin-top: 18px; font-size: 0.78rem;
      color: #7a7a9a; text-decoration: none;
    }
    .back-link:hover { color: #f5a623; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">
      <h1>{{ config.bar_name }}</h1>
      <small>Panel de gestión</small>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="error-msg">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" autofocus autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit">Ingresar</button>
    </form>

    <a href="{% url 'menu:menu_home' %}" class="back-link">← Ver menú público</a>
  </div>
</body>
</html>
